# Orient Advertise — Frontend Nginx config.
# Listens on 3000 (unprivileged) so the container can run as non-root.
# Serves the Vite-built SPA with try_files fallback for BrowserRouter.

worker_processes  auto;
pid               /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout  65;
  server_tokens   off;

  # Gzip
  gzip               on;
  gzip_vary          on;
  gzip_min_length    1024;
  gzip_proxied       any;
  gzip_comp_level    6;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/wasm
    image/svg+xml
    text/css
    text/plain
    text/xml;

  # Logs to stdout/stderr so `docker logs` works.
  access_log  /dev/stdout;
  error_log   /dev/stderr  warn;

  server {
    listen       3000 default_server;
    listen       [::]:3000 default_server;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Lightweight liveness probe used by the Dockerfile HEALTHCHECK.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    # Hashed asset bundles — immutable, cache aggressively.
    location /assets/ {
      access_log off;
      expires    1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files  $uri =404;
    }

    # Common static files Vite may emit at the root.
    location ~* \.(?:ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot)$ {
      access_log off;
      expires    30d;
      add_header Cache-Control "public, max-age=2592000";
      try_files  $uri =404;
    }

    # index.html — never cache; ensures new bundles are picked up immediately.
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      add_header Pragma        "no-cache";
      expires    off;
    }

    # SPA fallback — react-router BrowserRouter needs deep paths to resolve to
    # index.html. Without this, refreshing /devices/123 yields a 404.
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Baseline security headers.
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-Frame-Options        "SAMEORIGIN"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  }
}
